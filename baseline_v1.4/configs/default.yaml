data:
  data_root: "../ai11-level1-project/sprint_ai_project1_data"
  train_images: "train_images"
  test_images: "test_images"
  train_annotations: "train_annotations"
  processed_dir: "./data/processed"
  val_ratio: 0.2
  num_workers: 4

model:
  name: "faster_rcnn"
  backbone: "resnet50"
  pretrained: true
  num_classes: null

train:
  epochs: 10
  batch_size: 4
  learning_rate: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_scheduler:
    enabled: false   # true로 바꾸면 활성화
    step_size: 10
    gamma: 0.1
  clip_grad_norm:
    enabled: false   # true로 바꾸면 활성화
    max_norm: 1.0

augmentation:
  train:
    horizontal_flip:
      enabled: false  # true로 바꾸면 활성화
      prob: 0.5
    random_brightness:
      enabled: false  # true로 바꾸면 활성화
      value: 0.2
  val: {}

inference:
  score_threshold: 0.5
  nms_threshold: 0.5
  max_detections: 4

output:
  checkpoint_dir: "./outputs/checkpoints"
  prediction_dir: "./outputs/predictions"
  log_interval: 10
