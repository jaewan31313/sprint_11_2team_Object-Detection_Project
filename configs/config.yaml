# ============================================================
# 알약 감지 프로젝트 설정 파일
# ============================================================

# 프로젝트 기본 설정
project:
  name: "pill_detection"
  seed: 42

# 데이터 경로
data:
  raw_dir: "data/raw"
  image_dir: "data/raw/images"
  annotation_dir: "data/raw/annotations"
  processed_dir: "data/processed"
  # 클래스 정의 (background + 알약 종류)
  # 실제 데이터에 맞게 수정하세요
  classes:
    - "background"
    - "pill_A"
    - "pill_B"
    - "pill_C"
    - "pill_D"
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

# 모델 설정
model:
  name: "fasterrcnn_resnet50_fpn_v2"   # 변경 가능: fasterrcnn_resnet50_fpn, ssd300_vgg16
  pretrained: true
  max_detections: 4                     # 이미지당 최대 알약 감지 수
  score_threshold: 0.5                  # Confidence Score 임계값
  nms_threshold: 0.3                    # NMS IoU 임계값

# 학습 설정
train:
  epochs: 20
  batch_size: 8
  num_workers: 4
  image_size: 800
  optimizer:
    name: "sgd"                         # sgd / adam / adamw
    lr: 0.005
    momentum: 0.9
    weight_decay: 0.0005
  scheduler:
    name: "step"                        # step / cosine / reduce_on_plateau
    step_size: 5
    gamma: 0.1

# 평가 설정
evaluate:
  iou_threshold: 0.5
  score_threshold: 0.5

# 출력 경로
output:
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  prediction_dir: "outputs/predictions"
  save_best_only: true

# 증강(Augmentation) 설정
augmentation:
  train:
    horizontal_flip: true
    vertical_flip: false
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    rotation: 15
  val:
    horizontal_flip: false
