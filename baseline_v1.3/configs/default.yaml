data:
  data_root: "../ai11-level1-project/sprint_ai_project1_data"
  train_images: "train_images"
  test_images: "test_images"
  train_annotations: "train_annotations"
  processed_dir: "./data/processed"
  val_ratio: 0.2
  num_workers: 4

model:
  name: "faster_rcnn"
  backbone: "resnet50"
  pretrained: true
  num_classes: null  # auto-detected from dataset

train:
  epochs: 30
  batch_size: 4
  learning_rate: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_scheduler:
    type: "step"
    step_size: 10
    gamma: 0.1
  clip_grad_norm: 1.0

augmentation:
  train:
    horizontal_flip: 0.5
    vertical_flip: 0.0
    random_brightness: 0.2
    min_size: 800
    max_size: 1333
  val:
    min_size: 800
    max_size: 1333

inference:
  score_threshold: 0.5
  nms_threshold: 0.5
  max_detections: 4  # max 4 pills per image

output:
  checkpoint_dir: "./outputs/checkpoints"
  prediction_dir: "./outputs/predictions"
  log_interval: 10
